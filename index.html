<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네트워크관리사 2급 CBT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#12141a;color:#9ba8bb;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
#app{max-width:680px;margin:0 auto;padding:0 18px;}
button{font-family:inherit;cursor:pointer;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;}
.spinner{width:44px;height:44px;border:3px solid #1e2330;border-top-color:#5b6fd4;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#load-status{color:#4a5568;font-size:14px;}
#home{display:none;flex-direction:column;align-items:center;padding:40px 0 60px;}
.home-badge{display:inline-block;background:rgba(91,111,212,.1);border:1px solid rgba(91,111,212,.25);border-radius:20px;padding:5px 16px;font-size:11px;color:#7b8fd4;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.home-title{font-size:28px;font-weight:800;margin-bottom:10px;color:#c8d0df;letter-spacing:-0.5px;}
.home-sub{color:#3d4558;font-size:14px;margin-bottom:8px;}
.home-inner{width:100%;max-width:540px;}
#progress-summary{width:100%;background:#161a24;border:1px solid #1e2330;border-radius:14px;padding:16px 18px;margin-bottom:16px;display:none;}
.ps-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ps-label{font-size:11px;color:#3d4558;letter-spacing:1.5px;text-transform:uppercase;}
.ps-pct{font-size:13px;color:#5b6fd4;font-weight:600;}
.ps-bar-wrap{height:3px;background:#1e2330;border-radius:2px;overflow:hidden;margin-bottom:10px;}
.ps-bar{height:100%;background:linear-gradient(90deg,#5b6fd4,#7c5cbf);border-radius:2px;transition:width .4s;}
.ps-info{display:flex;justify-content:space-between;font-size:11px;color:#2a3040;}
.btn-random{width:100%;background:#181c26;border:1px solid #222840;border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:16px;margin-bottom:12px;color:inherit;text-align:left;transition:border-color .2s;}
.btn-random:hover{border-color:#5b6fd4;}
.btn-wrong-note{border-color:rgba(158,80,80,.3)!important;}
.btn-wrong-note:hover{border-color:#9e5050!important;}
.r-icon{font-size:28px;opacity:.9;}.r-title{font-weight:700;font-size:16px;color:#7b8fd4;}.r-sub{font-size:12px;color:#3d4558;margin-top:3px;}
.r-title-wrong{color:#c47070!important;}
.wn-badge{display:inline-block;background:rgba(158,80,80,.15);border:1px solid rgba(158,80,80,.3);border-radius:12px;padding:2px 8px;font-size:11px;color:#c47070;margin-left:6px;}
.year-label{font-size:10px;color:#3d4558;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;padding-left:2px;}
.year-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px;}
.exam-card{background:#161a24;border:1px solid #1e2330;border-radius:12px;padding:14px 16px;text-align:left;color:inherit;transition:border-color .2s;width:100%;cursor:pointer;}
.exam-card:hover{border-color:#3a4560;}
.exam-card.passed{border-color:rgba(58,110,80,.3);}
.e-round{font-weight:500;font-size:14px;color:#3a4050;}
.e-cnt{font-size:11px;color:#2a3040;margin-top:2px;}
.e-dots{display:flex;gap:4px;margin-top:6px;}
.e-dot{width:8px;height:8px;border-radius:50%;border:1px solid #252b38;}
.e-dot.pass{background:#3a6e50;border-color:#3a6e50;}
.e-dot.fail{background:#6e3a3a;border-color:#6e3a3a;}
.e-dot.empty{background:#1a1e28;}
.dl-wrap{margin-top:24px;text-align:center;}
.dl-btn{background:none;border:1px solid #1e2330;border-radius:10px;color:#3d4558;font-size:12px;padding:8px 20px;cursor:pointer;}
#exam{display:none;}
.top-bar{position:sticky;top:0;z-index:10;background:rgba(18,20,26,.97);backdrop-filter:blur(16px);border-bottom:1px solid #1a1e28;padding:10px 0 8px;}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.btn-back{background:none;border:none;color:#3d4558;font-size:13px;padding:0;}
.top-title{color:#3d4558;font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-num{color:#3d4558;font-size:12px;}
.progress-bar{height:2px;background:#1a1e28;border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#5b6fd4,#7c5cbf);border-radius:2px;transition:width .35s;}
.q-body{padding:24px 0 56px;}
.section-badge{display:inline-block;background:rgba(91,111,212,.08);border:1px solid rgba(91,111,212,.18);border-radius:20px;padding:3px 12px;font-size:11px;color:#5b6a9e;margin-bottom:16px;}
.q-num{color:#6b7db8;font-weight:700;font-size:17px;}
.q-main{font-size:15px;line-height:1.9;font-weight:400;color:#b0bac8;}
.q-desc{margin:10px 0 20px;background:#0f1119;border:1px solid #1e2330;border-left:3px solid #5b6fd4;border-radius:0 12px 12px 0;padding:14px 18px;}
.q-desc-label{font-size:10px;color:#2a3040;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;}
.q-desc-text{font-size:13px;color:#6b7585;line-height:2;white-space:pre-wrap;}
.q-desc-notice{font-size:12px;color:#2a3040;font-style:italic;}
.q-img-wrap{margin:0 0 20px;border-radius:12px;overflow:hidden;border:1px solid #1e2330;background:#0f1119;padding:10px;text-align:center;}
.q-img-wrap img{max-width:100%;height:auto;border-radius:8px;display:block;margin:0 auto;}
.choices{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.choice{border:1px solid #1e2330;background:#161a24;border-radius:14px;padding:14px 18px;display:flex;gap:14px;align-items:flex-start;transition:all .15s;cursor:pointer;text-align:left;width:100%;color:#7a8599;}
.choice:hover:not(.disabled){border-color:#3d4f8a;background:#191e2e;color:#9ba8bb;}
.choice.selected{border-color:#5b6fd4;background:rgba(91,111,212,.08);color:#9aa8d8;}
.choice.correct{border-color:#4a9e6a;background:rgba(74,158,106,.07);color:#80c49a;}
.choice.wrong{border-color:#9e5050;background:rgba(158,80,80,.07);color:#c49090;}
.choice.disabled{cursor:default;}
.choice-circle{flex-shrink:0;font-size:15px;font-weight:600;min-width:24px;color:#2a3040;}
.choice.selected .choice-circle{color:#5b6fd4;}
.choice.correct .choice-circle{color:#4a9e6a;}
.choice.wrong .choice-circle{color:#9e5050;}
.choice-text{line-height:1.75;font-size:14px;flex:1;}
.choice-icon{flex-shrink:0;}
.explain-box{background:#0f1119;border:1px solid #1e2330;border-radius:16px;padding:18px 20px;margin-bottom:22px;}
.explain-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.explain-status{font-weight:700;font-size:15px;}
.explain-ans{color:#3d4558;font-size:13px;}
.explain-text{color:#6b7585;font-size:14px;line-height:1.9;}
.explain-label{color:#5b6fd4;font-weight:600;}
.btn-row{display:flex;gap:10px;}
.btn-prev{flex:1;background:#161a24;border:1px solid #1e2330;border-radius:12px;color:#3d4558;font-weight:600;padding:14px;font-size:15px;transition:border-color .2s;}
.btn-prev:hover{border-color:#5b6fd4;}
.btn-confirm{flex:2;border:none;border-radius:12px;font-weight:700;padding:14px;font-size:15px;color:#2a3040;background:#161a24;}
.btn-confirm.active{background:linear-gradient(135deg,#5b6fd4,#7c5cbf);color:#e8ecf4;cursor:pointer;}
.btn-next{flex:2;border:none;border-radius:12px;font-weight:700;padding:14px;font-size:15px;color:#e8ecf4;background:linear-gradient(135deg,#5b6fd4,#7c5cbf);}
.btn-finish{flex:2;border:none;border-radius:12px;font-weight:700;padding:14px;font-size:15px;color:#e8ecf4;background:linear-gradient(135deg,#3d8a5a,#2e6644);}
#result{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}
.result-box{background:#161a24;border:1px solid #1e2330;border-radius:20px;padding:40px 32px;max-width:400px;width:100%;text-align:center;}
.result-icon{font-size:52px;margin-bottom:12px;}
.result-score{font-size:56px;font-weight:900;letter-spacing:-2px;}
.result-sub{color:#3d4558;font-size:15px;margin-top:6px;}
.result-badge{margin:14px auto 0;padding:8px 22px;display:inline-block;border-radius:20px;font-weight:700;font-size:14px;}
.result-btns{display:flex;gap:10px;margin-top:28px;}
.btn-home2{flex:1;background:#1e2330;border:1px solid #1e2330;border-radius:12px;color:#4a5568;font-weight:600;padding:13px;font-size:15px;}
.btn-retry{flex:1;background:linear-gradient(135deg,#5b6fd4,#7c5cbf);border:none;border-radius:12px;color:#e8ecf4;font-weight:700;padding:13px;font-size:15px;}
.review-title{font-size:12px;color:#3d4558;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;padding-left:2px;}
.review-item{background:#161a24;border:1px solid #1e2330;border-left:3px solid #9e5050;border-radius:14px;padding:18px 20px;margin-bottom:14px;}
.review-q-num{color:#5b6a9e;font-size:12px;margin-bottom:6px;}
.review-q-text{font-size:14px;color:#b0bac8;line-height:1.8;margin-bottom:14px;}
.review-desc{background:#0f1119;border:1px solid #1e2330;border-left:3px solid #5b6fd4;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:14px;}
.review-desc-text{font-size:12px;color:#5a6272;line-height:1.9;white-space:pre-wrap;}
.review-choices{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.review-choice{border-radius:10px;padding:9px 14px;display:flex;gap:10px;font-size:13px;}
.rc-correct{background:rgba(74,158,106,.07);border:1px solid #4a9e6a;color:#80c49a;}
.rc-wrong{background:rgba(158,80,80,.07);border:1px solid #9e5050;color:#c49090;}
.rc-normal{background:#1a1e28;border:1px solid #1e2330;color:#3d4558;}
.review-expl{background:#0f1119;border:1px solid #1e2330;border-radius:10px;padding:12px 14px;}
.review-expl-label{font-size:11px;color:#5b6fd4;font-weight:600;margin-bottom:5px;}
.review-expl-text{font-size:13px;color:#5a6272;line-height:1.85;}
</style>
</head>
<body>
<div id="app">
  <div id="loading"><div class="spinner"></div><p id="load-status">데이터 로딩 중...</p></div>
  <div id="home" style="display:none;">
    <div class="home-badge">국가공인 자격증</div>
    <h1 class="home-title">네트워크관리사 2급</h1>
    <p class="home-sub" id="home-sub">CBT 기출문제 · 2021~2026</p>
    <div class="home-inner">
      <div id="progress-summary">
        <div class="ps-row"><span class="ps-label">진도 현황</span><span class="ps-pct" id="ps-pct"></span></div>
        <div class="ps-bar-wrap"><div class="ps-bar" id="ps-bar"></div></div>
        <div class="ps-info"><span id="ps-done"></span><span id="ps-extra"></span></div>
      </div>
      <button class="btn-random" onclick="startExam('__random__')">
        <span class="r-icon">🎲</span>
        <div><div class="r-title">랜덤 모의고사</div><div class="r-sub">전체에서 50문제 무작위 출제</div></div>
      </button>
      <button class="btn-random btn-wrong-note" id="btn-wn" onclick="startWrongNote()" style="display:none;">
        <span class="r-icon">📕</span>
        <div><div class="r-title r-title-wrong">오답노트 <span class="wn-badge" id="wn-badge"></span></div><div class="r-sub">틀린 문제만 다시 풀기</div></div>
      </button>
      <div id="year-list"></div>
      <div class="dl-wrap"><button class="dl-btn" onclick="downloadHTML()">⬇ HTML 파일로 저장</button></div>
    </div>
  </div>
  <div id="exam" style="display:none;">
    <div class="top-bar">
      <div class="top-row">
        <button class="btn-back" onclick="showHome()">← 목록</button>
        <span class="top-title" id="exam-label"></span>
        <span class="top-num" id="exam-num"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="q-body">
      <div class="section-badge" id="q-section"></div>
      <div style="margin-bottom:10px;"><span class="q-num" id="q-num"></span><span class="q-main" id="q-main"></span></div>
      <div class="q-desc" id="q-desc" style="display:none;"><div class="q-desc-label">지문</div><div id="q-desc-text"></div></div>
      <div class="q-img-wrap" id="q-img-wrap" style="display:none;"><img id="q-img" src="" alt="문제 그림"></div>
      <div class="choices" id="choices"></div>
      <div id="explain-area"></div>
      <div class="btn-row" id="btn-row"></div>
    </div>
  </div>
  <div id="result" style="display:none;padding-bottom:40px;">
    <div class="result-box" id="result-box" style="max-width:540px;">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-badge" id="result-badge"></div>
      <div class="result-btns">
        <button class="btn-home2" onclick="showHome()">홈으로</button>
        <button class="btn-retry" id="btn-retry">다시 풀기</button>
      </div>
    </div>
    <div id="review-section" style="display:none;width:100%;max-width:540px;margin-top:28px;"></div>
  </div>
</div>

var IMG_B64 = "";

var QDATA=[], IMG_MAP={}, questions=[], qIdx=0, selected=null, confirmed=false, answers={}, examKey=null;
var wrongNote={}, examHistory={};

function loadGzip(b64,cb){
  try{
    if(typeof DecompressionStream === 'undefined') {
      cb(new Error('DecompressionStream not supported'));
      return;
    }
    var bin=atob(b64),bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    var ds=new DecompressionStream('gzip');
    var w=ds.writable.getWriter();w.write(bytes);w.close();
    var r=ds.readable.getReader(),chunks=[];
    function read(){r.read().then(function(x){
      if(x.done){
        var total=0;for(var j=0;j<chunks.length;j++)total+=chunks[j].length;
        var out=new Uint8Array(total),off=0;
        for(var j=0;j<chunks.length;j++){out.set(chunks[j],off);off+=chunks[j].length;}
        try { cb(null,JSON.parse(new TextDecoder().decode(out))); }
        catch(e) { cb(e); }
      }else{chunks.push(x.value);read();}
    }).catch(function(e){cb(e);});}
    read();
  }catch(e){cb(e);}
}

function loadWrongNote(){}
function saveWrongNote(){gistSave();}
function loadExamHistory(){}
function saveExamHistory(){gistSave();}

function recordWrong(q){var k=q.e+'||'+q.n;if(!wrongNote[k])wrongNote[k]={e:q.e,n:q.n,count:0};wrongNote[k].count++;wrongNote[k].last=Date.now();}
function recordCorrect(q){var k=q.e+'||'+q.n;if(wrongNote[k]){wrongNote[k].correct=(wrongNote[k].correct||0)+1;if(wrongNote[k].correct>=3)delete wrongNote[k];}}
function recordExamResult(key,pct,pass){if(key==='__random__'||key==='__wrongnote__')return;if(!examHistory[key])examHistory[key]=[];examHistory[key].push({score:pct,pass:pass,date:Date.now()});if(examHistory[key].length>5)examHistory[key].shift();saveExamHistory();}

function updateWrongNoteUI(){
  var keys=Object.keys(wrongNote),btn=document.getElementById('btn-wn'),badge=document.getElementById('wn-badge');
  if(keys.length>0){btn.style.display='flex';badge.textContent=keys.length+'문제';}else btn.style.display='none';
}

function updateProgressSummary(){
  var exams=[],seen={};
  for(var i=0;i<QDATA.length;i++){if(!seen[QDATA[i].e]){seen[QDATA[i].e]=true;exams.push(QDATA[i].e);}}
  var total=exams.length,attempted=0,passed=0,perfect=0;
  exams.forEach(function(e){var h=examHistory[e];if(h&&h.length>0){attempted++;if(h.some(function(r){return r.pass;}))passed++;if(h.length>=5)perfect++;}});
  var el=document.getElementById('progress-summary');
  if(attempted>0){
    el.style.display='block';
    var pct=Math.round(attempted/total*100);
    document.getElementById('ps-pct').textContent=pct+'%';
    document.getElementById('ps-bar').style.width=pct+'%';
    document.getElementById('ps-done').textContent='풀어본 '+attempted+'회차 / '+total+'회차';
    document.getElementById('ps-extra').textContent='합격 '+passed+' · 5회완료 '+perfect;
  }else el.style.display='none';
}

function startWrongNote(){
  var keys=Object.keys(wrongNote);if(!keys.length)return;
  keys.sort(function(a,b){return wrongNote[b].count-wrongNote[a].count;});
  var qs=[];
  keys.forEach(function(k){var wn=wrongNote[k];var found=QDATA.filter(function(q){return q.e===wn.e&&q.n===wn.n;});if(found.length)qs.push(found[0]);});
  if(!qs.length)return;
  examKey='__wrongnote__';questions=qs;qIdx=0;selected=null;confirmed=false;answers={};
  document.getElementById('home').style.display='none';
  document.getElementById('exam').style.display='block';
  renderQ();
}

document.getElementById('load-status').textContent='데이터 로딩 중...';
loadGzip(DATA_B64,function(err,d){
  if(err){document.getElementById('load-status').textContent='로드 실패: '+err.message;console.error('loadGzip err:',err);return;}
  QDATA=d;
  document.getElementById('load-status').textContent='서버 연결 중...';
  gistLoad(function(){
    loadImagesFromGist();
    buildHome();showHome();
  });
});

function buildHome(){
  var sub=document.getElementById('home-sub');
  if(sub)sub.textContent='CBT 기출문제 · 2021~2026 총 '+QDATA.length+'문제';
  var years=['2026','2025','2024','2023','2022','2021'],exams=[],seen={};
  for(var i=0;i<QDATA.length;i++)if(!seen[QDATA[i].e]){seen[QDATA[i].e]=true;exams.push(QDATA[i].e);}
  var el=document.getElementById('year-list');el.innerHTML='';
  years.forEach(function(yr){
    var list=exams.filter(function(e){return e.indexOf(yr)===0;});
    if(!list.length)return;
    var wrap=document.createElement('div');
    wrap.innerHTML='<div class="year-label">'+yr+'년</div><div class="year-grid" id="g-'+yr+'"></div>';
    el.appendChild(wrap);
    var grid=document.getElementById('g-'+yr);
    list.forEach(function(exam){
      var cnt=QDATA.filter(function(q){return q.e===exam;}).length;
      var m2=exam.match(/제(\d+)회/);
      var h=examHistory[exam]||[];
      var hasPassed=h.some(function(r){return r.pass;});
      var btn=document.createElement('button');
      btn.className='exam-card'+(hasPassed?' passed':'');
      var dots='';for(var i=0;i<5;i++){var cls=i<h.length?(h[i].pass?'pass':'fail'):'empty';dots+='<div class="e-dot '+cls+'"></div>';}
      btn.innerHTML='<div class="e-round">제'+(m2?m2[1]:'?')+'회</div><div class="e-cnt">'+cnt+'문제</div><div class="e-dots">'+dots+'</div>';
      btn.onclick=(function(ex){return function(){startExam(ex);};})(exam);
      grid.appendChild(btn);
    });
  });
  updateProgressSummary();
  updateWrongNoteUI();
}

function showHome(){
  document.getElementById('loading').style.display='none';
  document.getElementById('home').style.display='flex';
  document.getElementById('exam').style.display='none';
  document.getElementById('result').style.display='none';
  if(QDATA.length>0){buildHome();}
}

function fmtExam(e){if(e==='__wrongnote__')return '오답노트';var m=e.match(/(\d+)년정기제(\d+)회/);return m?m[1]+'년 제'+m[2]+'회':e;}

function startExam(key){
  examKey=key;
  if(key==='__random__'){
    var tmp=QDATA.slice();
    for(var i=tmp.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=tmp[i];tmp[i]=tmp[j];tmp[j]=t;}
    questions=tmp.slice(0,50);
  }else{questions=QDATA.filter(function(d){return d.e===key;});}
  qIdx=0;selected=null;confirmed=false;answers={};
  document.getElementById('home').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('exam').style.display='block';
  renderQ();
}

function renderQ(){
  var q=questions[qIdx];if(!q)return;
  document.getElementById('exam-label').textContent=fmtExam(examKey);
  document.getElementById('exam-num').textContent=(qIdx+1)+' / '+questions.length;
  document.getElementById('progress-fill').style.width=((qIdx+1)/questions.length*100)+'%';
  document.getElementById('q-section').textContent=q.s;
  var parts=q.q.split('\n\n[지문]\n');
  document.getElementById('q-num').textContent=q.n+'. ';
  document.getElementById('q-main').textContent=parts[0];
  var descEl=document.getElementById('q-desc'),descTxt=document.getElementById('q-desc-text');
  if(parts.length>1){
    descEl.style.display='block';
    var content=parts[1];
    descTxt.className=content.indexOf('※')===0?'q-desc-notice':'q-desc-text';
    descTxt.textContent=content;
  }else descEl.style.display='none';
  var imgKey=q.e+'||'+q.n,imgWrap=document.getElementById('q-img-wrap');
  if(IMG_MAP[imgKey]){document.getElementById('q-img').src='data:image/jpeg;base64,'+IMG_MAP[imgKey];imgWrap.style.display='block';}
  else imgWrap.style.display='none';
  var choicesEl=document.getElementById('choices');choicesEl.innerHTML='';
  for(var ci=0;ci<q.c.length;ci++){
    var btn=document.createElement('button');
    btn.className='choice';btn.dataset.num=ci+1;
    btn.innerHTML='<span class="choice-circle">'+CIRCLE[ci]+'</span><span class="choice-text">'+esc(q.c[ci])+'</span><span class="choice-icon"></span>';
    btn.onclick=(function(n){return function(){selectChoice(n);};})(ci+1);
    choicesEl.appendChild(btn);
  }
  document.getElementById('explain-area').innerHTML='';
  var prev=answers[qIdx];
  if(prev){selected=prev.sel;confirmed=true;applyResult(q,prev);}
  else{selected=null;confirmed=false;}
  renderBtns();
}

function selectChoice(num){
  if(confirmed)return;selected=num;
  var els=document.querySelectorAll('.choice');
  for(var i=0;i<els.length;i++)els[i].className='choice'+(parseInt(els[i].dataset.num)===num?' selected':'');
  renderBtns();
}

function confirmAnswer(){
  if(!selected)return;confirmed=true;
  var q=questions[qIdx];var correct=selected===q.a;
  answers[qIdx]={sel:selected,correct:correct,answer:q.a};
  if(correct)recordCorrect(q);else recordWrong(q);
  saveWrongNote();
  applyResult(q,answers[qIdx]);renderBtns();
}

function applyResult(q,ans){
  var ansNum=q.a;
  var els=document.querySelectorAll('.choice');
  for(var i=0;i<els.length;i++){
    var num=parseInt(els[i].dataset.num),icon=els[i].querySelector('.choice-icon');
    els[i].classList.remove('selected','correct','wrong');els[i].classList.add('disabled');
    if(num===ansNum){els[i].classList.add('correct');icon.textContent='✅';}
    else if(num===ans.sel&&!ans.correct){els[i].classList.add('wrong');icon.textContent='❌';}
    else icon.textContent='';
  }
  var expl=q.x||'';
  document.getElementById('explain-area').innerHTML=
    '<div class="explain-box"><div class="explain-top">'+
    '<span style="font-size:20px">'+(ans.correct?'✅':'❌')+'</span>'+
    '<span class="explain-status" style="color:'+(ans.correct?'#4a9e6a':'#9e5050')+'">'+(ans.correct?'정답입니다!':'오답입니다.')+'</span>'+
    (!ans.correct?'<span class="explain-ans">정답: '+CIRCLE[ansNum-1]+'</span>':'')+
    '</div>'+(expl?'<div class="explain-text"><span class="explain-label">💡 해설&nbsp;&nbsp;</span>'+esc(expl)+'</div>':'')+
    '</div>';
}

function nextQ(){if(qIdx<questions.length-1){qIdx++;selected=null;confirmed=false;renderQ();}else showResultScreen();}
function prevQ(){if(qIdx>0){qIdx--;renderQ();}}

function renderBtns(){
  var row=document.getElementById('btn-row');row.innerHTML='';
  if(qIdx>0){var b=document.createElement('button');b.className='btn-prev';b.textContent='← 이전';b.onclick=prevQ;row.appendChild(b);}
  if(!confirmed){var b=document.createElement('button');b.className='btn-confirm'+(selected?' active':'');b.textContent='확인';b.disabled=!selected;b.onclick=confirmAnswer;row.appendChild(b);}
  else{var b=document.createElement('button');var isLast=qIdx>=questions.length-1;b.className=isLast?'btn-finish':'btn-next';b.textContent=isLast?'결과 보기 🎯':'다음 문제 →';b.onclick=nextQ;row.appendChild(b);}
}

function showResultScreen(){
  var vals=Object.keys(answers).map(function(k){return answers[k];});
  var correctCount=vals.filter(function(a){return a.correct;}).length;
  var total=vals.length,pct=total>0?Math.round(correctCount/total*100):0,pass=pct>=60;
  recordExamResult(examKey,pct,pass);
  document.getElementById('result-icon').textContent=pass?'🎉':'📚';
  var sc=document.getElementById('result-score');sc.textContent=pct+'점';sc.style.color=pass?'#4a9e6a':'#9e5050';
  document.getElementById('result-sub').textContent=correctCount+'문제 정답 / '+total+'문제 중';
  var badge=document.getElementById('result-badge');
  badge.textContent=pass?'✓ 합격 (60점 이상)':'✗ 불합격 (60점 미만)';
  badge.style.background=pass?'rgba(74,158,106,.1)':'rgba(158,80,80,.1)';
  badge.style.color=pass?'#4a9e6a':'#9e5050';
  document.getElementById('result-box').style.borderColor=pass?'#4a9e6a':'#9e5050';
  document.getElementById('btn-retry').onclick=function(){startExam(examKey);};
  document.getElementById('exam').style.display='none';
  document.getElementById('result').style.display='flex';
  var wrongKeys=Object.keys(answers).filter(function(k){return !answers[k].correct;});
  var reviewEl=document.getElementById('review-section');
  if(!wrongKeys.length){reviewEl.style.display='none';return;}
  reviewEl.style.display='block';
  var out='<div class="review-title">📝 오답 복습 — '+wrongKeys.length+'문제</div>';
  wrongKeys.forEach(function(k){
    var q=questions[parseInt(k)],ans=answers[k];if(!q)return;
    var parts=q.q.split('\n\n[지문]\n'),qmain=parts[0],desc=parts.length>1?parts[1]:'',expl=q.x||'',myAns=ans.sel,correctAns=q.a;
    out+='<div class="review-item"><div class="review-q-num">'+esc(q.s)+' · '+q.n+'번</div><div class="review-q-text">'+esc(qmain)+'</div>';
    if(desc&&desc.indexOf('※')!==0)out+='<div class="review-desc"><div class="review-desc-text">'+esc(desc)+'</div></div>';
    out+='<div class="review-choices">';
    for(var ci=0;ci<q.c.length;ci++){var num=ci+1;var cls=num===correctAns?'rc-correct':(num===myAns?'rc-wrong':'rc-normal');var icon=num===correctAns?' ✅':(num===myAns?' ❌':'');out+='<div class="review-choice '+cls+'"><span>'+CIRCLE[ci]+'</span><span>'+esc(q.c[ci])+icon+'</span></div>';}
    out+='</div>';
    if(expl)out+='<div class="review-expl"><div class="review-expl-label">💡 해설</div><div class="review-expl-text">'+esc(expl)+'</div></div>';
    out+='</div>';
  });
  reviewEl.innerHTML=out;
}

function downloadHTML(){
  var blob=new Blob([document.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='NetworkCBT.html';a.click();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
